paths:
  /videos:
    get:
      summary: 'Rota utilizada para listar todos os vídeos'
      tags:
        - Vídeos
      parameters:
        - $ref: '#/components/parameters/SearchParameter'
        - $ref: '#/components/parameters/PageParameter'
        - $ref: '#/components/parameters/SizeParameter'
      responses:
        '200':
          description: 'OK'
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/VideoSchema'
                  - $ref: '#/components/schemas/PaginationSchema'

  /videos/{id}:
    parameters:
      - $ref: '#/components/parameters/IdParameter'
    get:
      summary: 'Rota utilizada para exibir um vídeo'
      tags:
        - Vídeos
      responses:
        '200':
          description: 'OK'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoSchema'

  /videos/{id}/comment:
    parameters:
      - $ref: '#/components/parameters/IdParameter'
    post:
      summary: 'Rota utilizada para postar um comentário em um vídeo'
      tags:
        - Vídeos
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentSchema'
      responses:
        '201':
          description: 'Created'

  /videos/{id}/like/{action}:
    parameters:
      - $ref: '#/components/parameters/IdParameter'
      - name: action
        in: path
        required: true
        schema:
          type: string
    post:
      summary: 'Rota utilizada para dar like ou dislike em um vídeo'
      tags:
        - Vídeos
      responses:
        '200':
          description: 'OK'

  /videos/{id}/view:
    parameters:
      - $ref: '#/components/parameters/IdParameter'
    post:
      summary: 'Rota utilizada para registrar uma visualização em um vídeo'
      tags:
        - Vídeos
      responses:
        '200':
          description: 'OK'

  /videos/{id}/campaign/view:
    parameters:
      - $ref: '#/components/parameters/IdParameter'
    post:
      summary: 'Rota utilizada para registrar visualização de campanha'
      tags:
        - Vídeos
      responses:
        '200':
          description: 'OK'

  /videos/{id}/campaign/click:
    parameters:
      - $ref: '#/components/parameters/IdParameter'
    post:
      summary: 'Rota utilizada para registrar clique de campanha'
      tags:
        - Vídeos
      responses:
        '200':
          description: 'OK'

  /videos/{id}/contact:
    parameters:
      - $ref: '#/components/parameters/IdParameter'
    post:
      summary: 'Rota utilizada para contato via vídeo'
      tags:
        - Vídeos
      responses:
        '200':
          description: 'OK'

  /videos/{id}/comment/{commentId}:
    parameters:
      - $ref: '#/components/parameters/IdParameter'
      - name: commentId
        in: path
        required: true
        schema:
          type: string
    post:
      summary: 'Rota utilizada para responder a um comentário'
      tags:
        - Vídeos
      responses:
        '200':
          description: 'OK'

  /videos/courses:
    get:
      summary: 'Rota utilizada para listar cursos'
      tags:
        - Vídeos
      responses:
        '200':
          description: 'OK'

  /videos/courses/{id}:
    parameters:
      - $ref: '#/components/parameters/IdParameter'
    get:
      summary: 'Rota utilizada para exibir um curso'
      tags:
        - Vídeos
      responses:
        '200':
          description: 'OK'